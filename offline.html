<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Unofficial Google Weather</title>
    <link rel="icon" type="image/png" href="images/cloud.png">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #020617 100%);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 24px;
        }

        .card {
            max-width: 360px;
        }

        img {
            width: 96px;
            height: auto;
            margin-bottom: 16px;
            opacity: 0.9;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0 0 8px;
        }

        p {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 999px;
            border: none;
            background: #4f46e5;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="images/cloud.png" alt="">
        <h1>You're offline</h1>
        <p>Unofficial Google Weather can't reach the internet right now. Reconnect to load live conditions and hazard
            alerts - your last cached forecast will appear automatically once you're back online.</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
</body>

</html>
